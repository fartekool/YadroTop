<!DOCTYPE html>
<html>
<head>
    <title>Yadro Monitoring TS</title>
    <style>
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }
    th {
        background-color: #f4f4f4;
        position: sticky;
        top: 0;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }
</style>
</head>
<body>
    <h1>System Monitor (TS)</h1>
    <div id="status" style="color: gray;">Статус: Подключение...</div>
    <div id="output">Ожидание...</div>

    <table id="process-table">
    <thead>
        <tr>
            <th onclick="changeSort('pid')" style="cursor:pointer">PID</th>
            <th onclick="changeSort('name')" style="cursor:pointer">Name</th>
            <th onclick="changeSort('user')" style="cursor:pointer">User</th>
            <th onclick="changeSort('cpu')" style="cursor:pointer">CPU %</th>
            <th onclick="changeSort('mem')" style="cursor:pointer">Memory</th>
            <th onclick="changeSort('threads')" style="cursor:pointer">Threads</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="process-list"></tbody>
    </table>    

    <script src="script.js"></script>
</body>
</html>
